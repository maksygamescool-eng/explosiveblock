name: Build Explosive Mining jar

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo (mod source)
        uses: actions/checkout@v4
        with:
          path: mod-source

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Download the real Forge 26.1 MDK
        run: |
          set -e
          curl -L -o mdk.zip "https://maven.minecraftforge.net/net/minecraftforge/forge/26.1-62.0.9/forge-26.1-62.0.9-mdk.zip"
          mkdir mdk
          unzip -q mdk.zip -d mdk

      - name: Overlay our mod source onto the MDK
        run: |
          set -e
          rm -rf mdk/src/main/java/com/example
          mkdir -p mdk/src/main/java/com/example
          cp -r mod-source/src/main/java/com/example/explosivemining mdk/src/main/java/com/example/
          cp mod-source/src/main/resources/META-INF/mods.toml mdk/src/main/resources/META-INF/mods.toml
          sed -i "s/^mod_id=.*/mod_id=explosivemining/" mdk/gradle.properties
          sed -i "s/^mod_name=.*/mod_name=Explosive Mining/" mdk/gradle.properties
          sed -i "s/^mod_version=.*/mod_version=1.0.0/" mdk/gradle.properties

      - name: Build with Gradle
        working-directory: mdk
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: explosivemining-jar
          path: mdk/build/libs/*.jar
